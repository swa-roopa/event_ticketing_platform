version: '3.8'

# Run: docker-compose up --build
# SQL primary:     http://localhost:5010
# SQL secondary:   http://localhost:5011
# NoSQL primary:   http://localhost:5002
# NoSQL secondary: http://localhost:5003

services:
  mysql:
    image: mysql:8.0
    container_name: globaltix-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=globaltix
      - MYSQL_USER=globaltix_admin
      - MYSQL_PASSWORD=localpassword
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: globaltix-dynamodb-local
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

  dynamodb-init:
    image: amazon/aws-cli:latest
    container_name: globaltix-dynamodb-init
    depends_on:
      - dynamodb-local
    environment:
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: ["/bin/sh", "-c", "sleep 5 && (aws dynamodb create-table --table-name globaltix-events --attribute-definitions AttributeName=event_id,AttributeType=S --key-schema AttributeName=event_id,KeyType=HASH --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000 || true) && (aws dynamodb create-table --table-name globaltix-tickets --attribute-definitions AttributeName=event_id,AttributeType=S AttributeName=ticket_id,AttributeType=S --key-schema AttributeName=event_id,KeyType=HASH AttributeName=ticket_id,KeyType=RANGE --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000 || true) && (aws dynamodb create-table --table-name globaltix-bookings --attribute-definitions AttributeName=booking_id,AttributeType=S AttributeName=user_id,AttributeType=S --key-schema AttributeName=booking_id,KeyType=HASH --global-secondary-indexes '[{\"IndexName\":\"user_id-index\",\"KeySchema\":[{\"AttributeName\":\"user_id\",\"KeyType\":\"HASH\"}],\"Projection\":{\"ProjectionType\":\"ALL\"}}]' --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000 || true) && (aws dynamodb create-table --table-name globaltix-booking-status --attribute-definitions AttributeName=booking_id,AttributeType=S --key-schema AttributeName=booking_id,KeyType=HASH --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000 || true)"]

  sql-primary:
    build: ./apps/sql
    container_name: globaltix-sql-primary
    ports:
      - "5010:5000"
    environment:
      - AWS_REGION=us-east-1
      - USE_SECRETS_MANAGER=false
      - PRIMARY_DB_HOST=mysql
      - SECONDARY_DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=globaltix
      - DB_USER=globaltix_admin
      - DB_PASSWORD=localpassword
      - BOOKING_STATUS_TABLE=globaltix-booking-status
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    depends_on:
      mysql:
        condition: service_healthy

  sql-secondary:
    build: ./apps/sql
    container_name: globaltix-sql-secondary
    ports:
      - "5011:5000"
    environment:
      - AWS_REGION=us-east-2
      - USE_SECRETS_MANAGER=false
      - PRIMARY_DB_HOST=mysql
      - SECONDARY_DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=globaltix
      - DB_USER=globaltix_admin
      - DB_PASSWORD=localpassword
      - BOOKING_STATUS_TABLE=globaltix-booking-status
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    depends_on:
      mysql:
        condition: service_healthy

  nosql-primary:
    build: ./apps/nosql
    container_name: globaltix-nosql-primary
    ports:
      - "5002:5000"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=us-east-1
      - EVENTS_TABLE=globaltix-events
      - TICKETS_TABLE=globaltix-tickets
      - BOOKINGS_TABLE=globaltix-bookings
      - BOOKING_STATUS_TABLE=globaltix-booking-status
      - AWS_ENDPOINT_URL=http://dynamodb-local:8000
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully

  nosql-secondary:
    build: ./apps/nosql
    container_name: globaltix-nosql-secondary
    ports:
      - "5003:5000"
    environment:
      - AWS_REGION=us-east-2
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=us-east-1
      - EVENTS_TABLE=globaltix-events
      - TICKETS_TABLE=globaltix-tickets
      - BOOKINGS_TABLE=globaltix-bookings
      - BOOKING_STATUS_TABLE=globaltix-booking-status
      - AWS_ENDPOINT_URL=http://dynamodb-local:8000
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully

volumes:
  mysql_data: